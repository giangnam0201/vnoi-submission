name: Generate VNOI Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Clone repo
        uses: actions/checkout@v4
    
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch VNOI contribution data
        run: python fetch_vnoi.py "GiangNam2014"
        
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
    
      - name: Generate the snake animations locally
        run: |
          mkdir -p dist
          # Using the exact compilation package matching the action engine
          npx @platane/snk ./vnoi_contributions.json \
            "dist/github-contribution-grid-snake.svg" \
            "dist/github-contribution-grid-snake-dark.svg?palette=github-dark" \
            "dist/github-contribution-grid-snake.gif?color_snake=orange&color_dots=#bfd6f6,#8dbdff,#64a1f4,#4b91f1,#3c7dd9"

      - name: Push new files to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
          commit_message: Update VNOI snake animations
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
